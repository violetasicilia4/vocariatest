# Vocaria — Netlify Config
# Cuando tengas dominio propio, configurarlo en Netlify Dashboard → Domain settings.

[build]
  command   = "npm run build"
  publish   = "dist"

# SPA redirect: todas las rutas sirven el index.html
# Las páginas estáticas en /public/* tienen prioridad automática.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de seguridad y performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    Content-Security-Policy   = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self' https://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
