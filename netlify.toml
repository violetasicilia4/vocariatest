# Vocaria — Netlify Config
# Cuando tengas dominio propio, configurarlo en Netlify Dashboard → Domain settings.

[build]
  command   = "npm run build"
  publish   = "dist"

# SPA redirect: todas las rutas sirven el index.html
# Las páginas estáticas en /public/* tienen prioridad automática.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de seguridad y performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
